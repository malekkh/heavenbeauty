name: CI

# Quality gate only. Deployments are handled by Vercel's Git integration
# (push to main → Production, PR → Preview), so this workflow no longer runs
# the Vercel CLI — it just fails the check if lint or types break.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm typecheck
